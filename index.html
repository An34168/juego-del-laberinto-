<!DOCTYPE html>
<html>
<head>
  <title>Juego del Laberinto</title>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    canvas {
      background: white;
      border: 4px solid #444;
      margin-top: 20px;
    }

    /* =========================
       OVERLAY PANTALLA COMPLETA
    ========================= */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
    }

    .cardBig {
      width: 270px;
      height: 390px;
      perspective: 1000px;
      text-align: center;
      color: white;
    }

    .cardBig .inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1s;
    }

    .overlay.show .cardBig .inner {
      transform: rotateY(180deg);
    }

    .cardBig .front,
    .cardBig .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 15px;
    }

    .cardBig .front {
      background: gold;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 60px;
      color: black;
    }

    .cardBig .back {
      transform: rotateY(180deg);
    }

    .cardBig img {
      width: 100%;
      height: 100%;
      border-radius: 15px;
    }

    .cardBig h2 {
      margin-top: 15px;
    }

    .cardBig p {
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h1>Juego del Laberinto</h1>
  <p>Usa las flechas del teclado para llegar al cuadro verde.</p>

  <canvas id="juego" width="500" height="400"></canvas>

  <!-- 🃏 CARTA FULL SCREEN -->
  <div id="overlay" class="overlay">
    <div class="cardBig">
      <div class="inner">
        <div class="front">?</div>
        <div class="back">
          <img src="ARTURO.png" />
        </div>
      </div>

      <h2>🎉 Has desbloqueado la carta</h2>
      <p>Haz click en cualquier parte para salir</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("juego");
    const ctx = canvas.getContext("2d");

    let jugador = {
      x: 20,
      y: 20,
      size: 20,
      speed: 10
    };

    let meta = {
      x: 450,
      y: 350,
      size: 30
    };

    let paredes = [
      {x: 60, y: 0, width: 20, height: 300},
      {x: 120, y: 100, width: 20, height: 300},
      {x: 180, y: 0, width: 20, height: 250},
      {x: 240, y: 150, width: 20, height: 250},
      {x: 300, y: 0, width: 20, height: 300},
      {x: 360, y: 100, width: 20, height: 300}
    ];

    function dibujar() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // meta
      ctx.fillStyle = "green";
      ctx.fillRect(meta.x, meta.y, meta.size, meta.size);

      // jugador
      ctx.fillStyle = "red";
      ctx.fillRect(jugador.x, jugador.y, jugador.size, jugador.size);

      // paredes
      ctx.fillStyle = "black";
      paredes.forEach(p => {
        ctx.fillRect(p.x, p.y, p.width, p.height);
      });
    }

    function colision(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.size > b.x &&
        a.y < b.y + b.height &&
        a.y + a.size > b.y
      );
    }

    function mover(dx, dy) {
      let nueva = {
        x: jugador.x + dx,
        y: jugador.y + dy,
        size: jugador.size
      };

      if (
        nueva.x < 0 ||
        nueva.y < 0 ||
        nueva.x + nueva.size > canvas.width ||
        nueva.y + nueva.size > canvas.height
      ) return;

      for (let p of paredes) {
        if (colision(nueva, p)) return;
      }

      jugador.x = nueva.x;
      jugador.y = nueva.y;

      checkWin();
      dibujar();
    }

    function checkWin() {
      if (
        jugador.x < meta.x + meta.size &&
        jugador.x + jugador.size > meta.x &&
        jugador.y < meta.y + meta.size &&
        jugador.y + jugador.size > meta.y
      ) {
        const overlay = document.getElementById("overlay");

        overlay.style.display = "flex";

        setTimeout(() => {
          overlay.classList.add("show");
        }, 200);
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp") mover(0, -jugador.speed);
      if (e.key === "ArrowDown") mover(0, jugador.speed);
      if (e.key === "ArrowLeft") mover(-jugador.speed, 0);
      if (e.key === "ArrowRight") mover(jugador.speed, 0);
    });

    // cerrar overlay al hacer click
    document.getElementById("overlay").addEventListener("click", function () {
      this.style.display = "none";
      this.classList.remove("show");
    });

    dibujar();
  </script>

</body>
</html>
